# Cloudflare Workers 配置文件
# 文档: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "share-file-cdn"
main = "cloudflare-worker.js"
compatibility_date = "2026-05-27"

# Workers 类型
# - "javascript" 用于标准 Workers
workers_dev = true

