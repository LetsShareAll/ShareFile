<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一起分享吧！文件！</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" crossorigin src="/assets/scripts/index.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/styles/index.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-share-alt"></i> 一起分享吧！文件！</h1>
        <div class="toolbar">
          <div class="view-switch" role="group" aria-label="视图模式">
            <button id="btn-icon-view" class="active" title="大图标模式">
              <i class="fas fa-th-large"></i>
            </button>
            <button id="btn-detail-view" title="详细信息模式">
              <i class="fas fa-list"></i>
            </button>
          </div>
          <div class="theme-switch" role="group" aria-label="外观主题">
            <button id="btn-auto-theme" title="自动深色模式">
              <i class="fas fa-adjust"></i>
            </button>
            <button id="btn-light-theme" title="浅色模式">
              <i class="fas fa-sun"></i>
            </button>
            <button id="btn-dark-theme" title="深色模式">
              <i class="fas fa-moon"></i>
            </button>
          </div>
        </div>
      </header>

      <div class="search-panel">
        <label class="search-box" aria-label="搜索文件">
          <i class="fas fa-search"></i>
          <input id="site-search" type="search" placeholder="搜索文件" />
        </label>
      </div>

      <nav id="breadcrumb" aria-label="面包屑导航"></nav>

      <div id="loading-spinner" class="loading-container">
        <i class="fas fa-circle-notch fa-spin fa-3x"></i>
        <p>正在加载索引数据...</p>
      </div>

      <main id="content" aria-live="polite" style="display: none"></main>

      <section id="preview" class="preview-section" style="display: none">
        <h2><i class="fas fa-book-open"></i> README.md</h2>
        <div id="preview-content" class="rendered-markdown"></div>
      </section>
    </div>

    <div id="preview-modal" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <span id="modal-title">文件预览</span>
          <button id="modal-close" class="modal-close-btn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="modal-body" class="modal-body rendered-markdown"></div>
      </div>
    </div>
  </body>
</html>
