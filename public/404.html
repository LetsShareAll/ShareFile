<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面未找到 - 即将跳转</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --card-bg: rgba(255, 255, 255, 0.72);
        --card-border: rgba(0, 0, 0, 0.08);
        --text: #1d1d1f;
        --shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
        --primary: #0071e3;
        --radius: 24px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1c1e;
          --card-bg: rgba(44, 44, 46, 0.7);
          --card-border: rgba(255, 255, 255, 0.1);
          --text: #f5f5f7;
          --shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
          --primary: #0a84ff;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue',
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        transition: background 0.4s;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 3rem 2.5rem;
        text-align: center;
        max-width: 480px;
        width: 100%;
        animation: fadeUp 0.5s ease-out;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        line-height: 1;
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      p {
        color: var(--text);
        opacity: 0.7;
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 2rem;
      }

      .loader {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid rgba(128, 128, 128, 0.2);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 0.5rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .button {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.7rem 2rem;
        background: var(--primary);
        color: white;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 500;
        transition:
          background 0.2s,
          transform 0.1s;
        border: none;
        cursor: pointer;
      }

      .button:hover {
        background: #0077ed;
        transform: scale(1.02);
      }

      .button:active {
        transform: scale(0.98);
      }

      .path-display {
        font-family: 'SF Mono', monospace;
        background: rgba(128, 128, 128, 0.1);
        border-radius: 8px;
        padding: 0.3em 0.6em;
        font-size: 0.9em;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📁</div>
      <h1>正在打开文件路径…</h1>
      <p>
        您访问的路径<br />
        <span class="path-display" id="pathDisplay"></span><br />
        即将返回应用并保留当前路径。
      </p>
      <div class="loader"></div>
      <br />
      <a class="button" href="/">直接前往首页</a>
    </div>

    <script>
      (function () {
        var pendingRouteKey = 'share-file:pending-route';
        var path = window.location.pathname;
        var routePath = path;

        try {
          routePath = decodeURIComponent(path);
        } catch (error) {
          routePath = path;
        }

        var displayEl = document.getElementById('pathDisplay');
        if (displayEl) {
          displayEl.textContent = routePath || '/';
        }

        // GitHub Pages 会把不存在的 clean URL 交给 404.html。
        // 保存目标路径后回到首页，由前端路由恢复为 /path/to/file。
        if (path !== '/' && path !== '') {
          try {
            sessionStorage.setItem(pendingRouteKey, routePath);
          } catch (error) {
            window.location.replace('/?path=' + encodeURIComponent(routePath));
            return;
          }

          window.location.replace('/');
        } else {
          window.location.replace('/');
        }
      })();
    </script>
  </body>
</html>
