# ShareFile Python CLI 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

# generate-info 配置
generate_info:
  # 扫描的根目录（相对于配置文件或绝对路径）
  root_dir: '.'

  # 输出文件名
  output_filename: '._info.json'

  # 是否递归处理子目录
  recursive: true

  # 是否计算文件哈希（MD5 和 SHA256）
  calculate_hash: true

  # 是否从 Git 历史获取时间戳
  use_git_history: true

  # 是否更新文件大小
  update_size: true

  # 是否清理失效的物理节点（文件已删除但仍在 ._info.json 中）
  clean_invalid: true

  # 是否清理被忽略规则匹配的节点
  clean_ignored: true

  # 是否精简目录节点的冗余字段（如 size、md5 等）
  purify_folders: true

  # 是否格式化 JSON 输出（字段排序）
  format_output: true

  # 是否忽略 hold 锁定，强制更新所有字段
  force_update: false

  # 是否为预览模式（不写入文件）
  dry_run: false

  # 是否输出详细日志
  verbose: false

  # 额外的忽略规则（正则表达式列表）
  ignore_patterns:
    - "^\\.tmp$"
    - "^\\.cache$"
    # - "^test_.*\\.py$"

# generate-share-file 配置
generate_share_file:
  # 扫描的根目录
  root_dir: '.'

  # 输出文件路径
  # 默认为 {root_dir}/share-file.json
  output_file: './share-file.json'

  # CDN 文件访问基础 URL（用于生成 share-file.cdn.json）
  # 默认值与站点发布地址一致
  cdn_base_url: 'https://cdn-file.lssa.fun/raw.githubusercontent.com/LetsShareAll/ShareFile/main/public'

  # 是否输出详细日志
  verbose: false
