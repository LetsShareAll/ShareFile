custom_proxy_group=📽️ 油管视频`select`⛽ 油管节点`[]🔰 节点选择`[]🎯 全球直连`.*
custom_proxy_group=🎻 声破天音`select`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇸🇬 狮城节点`[]🔰 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*
; custom_proxy_group=🎶 网易音乐`select`[]🎯 全球直连`🎟️ 网易节点`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=📢 谷歌推送`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🪟 微软服务`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=💾 微软云盘`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=☁️ 苹果云盘`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=📲 电报信息`select`[]🔰 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=🌎 国外媒体`select`[]🔰 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=🌏 国内媒体`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
; 地区/功能节点分组
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|[Hh]ong [Kk]ong)`http://www.gstatic.com/generate_204`300
