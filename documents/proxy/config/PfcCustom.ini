; PfcCustom.ini
; 本规则无拦截规则，请配合 OpenClash 保姆级教程使用：https://github.com/Aethersailor/Custom_OpenClash_Rules。
; 作者：LetsShareAll Team
; 基于 https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/cfg/Custom_Clash.ini 修改。

[custom]
; 设置规则标志位
; 自定义规则集
ruleset=🎯 全球直连,https://file.lssa.fun/document/proxy/ruleset/PfcDirect.list,86400
ruleset=🔰 节点选择,https://file.lssa.fun/document/proxy/ruleset/PfcProxy.list,86400
ruleset=🤖 智能聊天,https://file.lssa.fun/document/proxy/ruleset/PfcAI.list,86400
ruleset=🚂 蒸汽社区,https://file.lssa.fun/document/proxy/ruleset/PfcSteamCommunity.list,86400


; 人工智能
; OpenAI
ruleset=🤖 智能聊天,[]GEOSITE,openai
; 新必应
ruleset=🤖 智能聊天,[]GEOSITE,bing
; 其他国内无法访问的人工智能服务
ruleset=🤖 智能聊天,[]GEOSITE,category-ai-!cn

; 需特选节点的视频流媒体服务
ruleset=🎥 奈飞视频,[]GEOSITE,netflix
ruleset=🎥 奈飞视频,[]GEOIP,netflix,no-resolve
ruleset=🐉 巴哈姆特,[]GEOSITE,bahamut
ruleset=📺 哔哩哔哩,[]GEOSITE,bilibili

; 需特选节点的音乐流媒体服务
ruleset=🎻 声破天音,[]GEOSITE,spotify
; ruleset=🎶 网易音乐,[]GEOSITE,netease-music
ruleset=🎮 游戏平台,[]GEOSITE,steam
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=📲 电报信息,[]GEOIP,telegram,no-resolve

; 特定需求下需要特选节点的服务
ruleset=🪟 微软服务,[]GEOSITE,microsoft
ruleset=💾 微软云盘,[]GEOSITE,onedrive
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=☁️ 苹果云盘,[]GEOSITE,icloud
ruleset=📢 谷歌推送,[]GEOSITE,googlefcm

; 直连
; 私有地址和域名
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
; 国内地址和域名
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
; 可直连谷歌
ruleset=🎯 全球直连,[]GEOSITE,google-cn
; 国内游戏
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
; 游戏平台下载
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
; 种子追踪器
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

; 无特殊情况无需特选节点的国外服务
; 以油管为例的国外视频流媒体服务
; 油管
ruleset=📽️ 油管视频,[]GEOSITE,youtube
; 苹果 TV+
ruleset=📽️ 油管视频,[]GEOSITE,apple-tvplus
; 迪士尼+
ruleset=📽️ 油管视频,[]GEOSITE,disney
; HBO
ruleset=📽️ 油管视频,[]GEOSITE,hbo
; Prime Video
ruleset=📽️ 油管视频,[]GEOSITE,primevideo
; Emby
ruleset=📽️ 油管视频,[]GEOSITE,category-emby
; 抖音
ruleset=📽️ 油管视频,[]GEOSITE,tiktok
; 以电报为例的即时通讯服务
ruleset=📲 电报信息,[]GEOSITE,telegram
ruleset=📲 电报信息,[]GEOSITE,category-communication
; 其他社交媒体或购物平台
ruleset=🌎 国外媒体,[]GEOIP,twitter,no-resolve
ruleset=🌎 国外媒体,[]GEOIP,facebook,no-resolve
ruleset=🌎 国外媒体,[]GEOSITE,category-social-media-!cn
ruleset=🌎 国外媒体,[]GEOSITE,category-ecommerce
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
; GitHub
ruleset=🔰 节点选择,[]GEOSITE,github
; 谷歌
ruleset=🔰 节点选择,[]GEOSITE,google
ruleset=🔰 节点选择,[]GEOIP,google,no-resolve
; 其他
ruleset=🔰 节点选择,[]GEOSITE,gfw
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🔰 节点选择`select`[]♻️ 自动选择`[]🚧 故障转移`[]🎯 全球直连`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=🚧 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=🤖 智能聊天`select`[]🧠 智聊节点`[]🔰 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=🎮 游戏平台`select`[]🎯 全球直连`[]🔰 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🚂 蒸汽社区`select`[]🔰 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*
