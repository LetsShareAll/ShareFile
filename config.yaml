# ShareFile file branch generate configuration.
# This file is consumed by .github/workflows/generate-index.yml.

generate_info:
  root_dir: '.'
  output_filename: '._info.json'
  recursive: true
  calculate_hash: true
  use_git_history: true
  update_size: true
  clean_invalid: true
  clean_ignored: true
  purify_folders: true
  format_output: true
  force_update: false
  dry_run: false
  verbose: false

  # Regex patterns matched against file or directory names.
  # Keep generated indexes and branch maintenance files out of ._info.json.
  ignore_patterns:
    - "^share-file\\.json$"
    - "^share-file\\.cdn\\.json$"
    - "^config\\.ya?ml$"
    - "^README\\.md$"
    - "^src$"
    - "^public$"

generate_share_file:
  root_dir: '.'
  output_file: './share-file.json'
  cdn_base_url: 'https://cdn-file.lssa.fun/raw.githubusercontent.com/LetsShareAll/ShareFile/file'
  verbose: false
