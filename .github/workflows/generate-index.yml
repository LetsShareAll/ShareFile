name: 生成文件索引

on:
  push:
    branches:
      - 'file'
    paths-ignore:
      - 'README.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    env:
      CONFIG_FILE: ./config.yaml
    concurrency:
      group: file-index
      cancel-in-progress: false

    steps:
      - name: 签出 file 分支
        uses: actions/checkout@v6
        with:
          ref: file
          fetch-depth: 0

      - name: 获取生成工具
        id: tools
        run: |
          set -euo pipefail
          tools_dir="$RUNNER_TEMP/sharefile-tools"
          mkdir -p "$tools_dir"

          git fetch origin main
          git show origin/main:public/softwares/applications/tools/generate-info-linux > "$tools_dir/generate-info-linux"
          git show origin/main:public/softwares/applications/tools/generate-share-file-linux > "$tools_dir/generate-share-file-linux"

          chmod +x "$tools_dir"/generate-*
          ls -lh "$tools_dir"
          echo "dir=$tools_dir" >> "$GITHUB_OUTPUT"

      - name: 检查生成配置
        run: |
          test -f "$CONFIG_FILE"
          sed -n '1,120p' "$CONFIG_FILE"

      - name: 生成目录元数据
        run: |
          "${{ steps.tools.outputs.dir }}/generate-info-linux" . --recursive --config "$CONFIG_FILE"

      - name: 生成文件索引
        run: |
          "${{ steps.tools.outputs.dir }}/generate-share-file-linux" . ./share-file.json --config "$CONFIG_FILE"

      - name: 检查更改
        id: git-check
        run: |
          echo "检查是否有文件被修改..."
          if git status --porcelain | grep -q .; then
            echo "检测到文件更改"
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "没有检测到更改"
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交更改
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "🐎 ci(file): 自动生成文件索引 [skip ci]"
          git push
